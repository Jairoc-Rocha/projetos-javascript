<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Gorjeta</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/scripts.js" defer></script>
  </head>
  <body>
    <div class="calculator">
      <h2>Calculadora de Gorjeta</h2>
      <label for="billAmount">Valor da conta:</label>
      <input
        type="number"
        id="billAmount"
        placeholder="R$"
        step="0.01"
        autocomplete="off"
      />
      <label for="serviceQuality">Qualidade do serviço</label>
      <select id="serviceQuality">
        <option value="0.1">Excelente - 10%</option>
        <option value="0.08">Ótimo - 8%</option>
        <option value="0.05">Bom - 5%</option>
        <option value="0.02">Ruím - 2%</option>
      </select>
      <button id="calculateBtn">Calcular Gorjeta</button>
      <div class="result">
        <label for="tipAmount">Valor da gorjeta:</label>
        <input type="text" id="tipAmount" disabled autocomplete="off" />
        <label for="totalAmount">Valor total:</label>
        <input type="text" id="totalAmount" disabled autocomplete="off" />
      </div>
    </div>
  </body>
</html>
